version: '3.9'
services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: visually
      POSTGRES_PASSWORD: visually
      POSTGRES_DB: visually_platform
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U visually"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  agent_service:
    build:
      context: ./backend
      dockerfile: agent_service/Dockerfile
    ports:
      - "8001:8001"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_SESSION_TOKEN=${AWS_SESSION_TOKEN}
      - JWT_SECRET=${JWT_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - BEDROCK_SONNET_MODEL_ID=${BEDROCK_SONNET_MODEL_ID}
      - BEDROCK_HAIKU_MODEL_ID=${BEDROCK_HAIKU_MODEL_ID}
      - BEDROCK_VISION_MODEL_ID=${BEDROCK_VISION_MODEL_ID}
      - BEDROCK_MAX_TOKENS=${BEDROCK_MAX_TOKENS:-2048}
      - BEDROCK_TEMPERATURE=${BEDROCK_TEMPERATURE:-0.0}
      - QUERY_EXECUTOR_URL=http://query_executor:8002
      - SCHEMA_CRAWLER_URL=http://schema_crawler:8003
      - RENDER_SERVICE_URL=http://render_service:3001
      - LOCAL_UPLOADS_DIR=/app/uploads
      - S3_ENDPOINT_URL=
      - DEV_MODE=${DEV_MODE:-false}
      - EXPORT_SERVICE_URL=http://export_service:3002
      - AGENT_SERVICE_PUBLIC_URL=http://localhost:8001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/shared:/app/shared
      - uploads_data:/app/uploads

  query_executor:
    build:
      context: ./backend
      dockerfile: query_executor/Dockerfile
    ports:
      - "8002:8002"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_SESSION_TOKEN=${AWS_SESSION_TOKEN}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/shared:/app/shared

  schema_crawler:
    build:
      context: ./backend
      dockerfile: schema_crawler/Dockerfile
    ports:
      - "8003:8003"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_SESSION_TOKEN=${AWS_SESSION_TOKEN}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - BEDROCK_SONNET_MODEL_ID=${BEDROCK_SONNET_MODEL_ID}
      - BEDROCK_HAIKU_MODEL_ID=${BEDROCK_HAIKU_MODEL_ID}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/shared:/app/shared

  render_service:
    build:
      context: ./backend/render_service
    ports:
      - "3001:3001"
    environment:
      - PORT=3001

  export_service:
    build:
      context: ./backend
      dockerfile: export_service/Dockerfile
    ports:
      - "3002:3002"
    environment:
      - EXPORT_SERVICE_URL=http://export_service:3002
      - LOCAL_UPLOADS_DIR=/app/uploads
      - S3_ENDPOINT_URL=
    depends_on:
      - agent_service
    volumes:
      - ./backend/shared:/app/shared
      - uploads_data:/app/uploads

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8001
      - NEXT_PUBLIC_WS_URL=ws://localhost:8001
    depends_on:
      - agent_service

volumes:
  postgres_data:
  uploads_data:
