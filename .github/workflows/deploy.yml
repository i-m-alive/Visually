name: Deploy to Azure Container Apps

# Auto-deploys on push/merge to main, and can be run manually from the Actions
# tab (Run workflow). Requires repo secret AZURE_CREDENTIALS (the
# service-principal JSON) — see azure/README.md "GitHub Actions setup".

on:
  push:
    branches: [main]
  workflow_dispatch: {}

env:
  RG: visually-rg
  ACR: visuallyacr0615
  ACR_LOGIN: visuallyacr0615.azurecr.io
  AGENT_URL: https://vly-agent-service.braveglacier-c2d0e1cf.southeastasia.azurecontainerapps.io
  WS_URL: wss://vly-agent-service.braveglacier-c2d0e1cf.southeastasia.azurecontainerapps.io
  TAG: ${{ github.sha }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Ensure containerapp extension
        run: az extension add --name containerapp --upgrade --only-show-errors

      - name: ACR login
        run: az acr login -n "$ACR"

      # ---- build & push all images (tagged with the commit SHA) ----
      - name: Build & push backend images
        run: |
          set -e
          build() { docker build -t "$ACR_LOGIN/$1:$TAG" -f "$2" "$3" && docker push "$ACR_LOGIN/$1:$TAG"; }
          build agent-service  backend/agent_service/Dockerfile  backend
          build query-executor backend/query_executor/Dockerfile backend
          build schema-crawler backend/schema_crawler/Dockerfile backend
          build export-service backend/export_service/Dockerfile backend
          build render-service backend/render_service/Dockerfile backend/render_service

      - name: Build & push frontend (bakes public API URL)
        run: |
          set -e
          docker build -t "$ACR_LOGIN/frontend:$TAG" \
            --build-arg NEXT_PUBLIC_API_URL="$AGENT_URL" \
            --build-arg NEXT_PUBLIC_WS_URL="$WS_URL" \
            -f frontend/Dockerfile frontend
          docker push "$ACR_LOGIN/frontend:$TAG"

      # ---- refresh AWS creds on the 3 apps that call Bedrock/AWS ----
      # Runs BEFORE the image roll so the new revision picks up fresh secrets.
      # secret-set is revision-neutral; the image update below applies them.
      - name: Sync AWS credentials
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
        run: |
          set -e
          APPS="vly-agent-service vly-query-executor vly-schema-crawler"
          # build secret args (only include session token if it's set)
          SEC=( aws-access-key="$AWS_ACCESS_KEY_ID" aws-secret-key="$AWS_SECRET_ACCESS_KEY" )
          if [ -n "$AWS_SESSION_TOKEN" ]; then SEC+=( aws-session-token="$AWS_SESSION_TOKEN" ); fi
          for app in $APPS; do
            az containerapp secret set -n "$app" -g "$RG" --secrets "${SEC[@]}" -o none
            if [ -n "$AWS_SESSION_TOKEN" ]; then
              az containerapp update -n "$app" -g "$RG" --set-env-vars AWS_SESSION_TOKEN=secretref:aws-session-token -o none
            else
              # permanent IAM keys: no session token — drop the env var so boto3 doesn't see an empty one
              az containerapp update -n "$app" -g "$RG" --remove-env-vars AWS_SESSION_TOKEN -o none 2>/dev/null || true
            fi
          done

      # ---- roll each container app to the new image (env vars/secrets persist) ----
      - name: Deploy new images
        run: |
          set -e
          upd() { az containerapp update -n "$1" -g "$RG" --image "$ACR_LOGIN/$2:$TAG" -o none; }
          upd vly-agent-service  agent-service
          upd vly-query-executor query-executor
          upd vly-schema-crawler schema-crawler
          upd vly-export-service export-service
          upd vly-render-service render-service
          upd vly-frontend       frontend

      # ---- run DB migrations against the new image (alembic upgrade head is idempotent) ----
      - name: Run migrations
        run: |
          set -e
          az containerapp job update -n vly-migrate -g "$RG" --image "$ACR_LOGIN/agent-service:$TAG" -o none
          az containerapp job start  -n vly-migrate -g "$RG" -o none
          echo "Migration job started — check: az containerapp job execution list -n vly-migrate -g $RG -o table"

      - name: Summary
        run: |
          echo "Deployed commit $TAG"
          echo "Frontend: $(az containerapp show -n vly-frontend      -g $RG --query properties.configuration.ingress.fqdn -o tsv)"
          echo "API:      $(az containerapp show -n vly-agent-service -g $RG --query properties.configuration.ingress.fqdn -o tsv)"
