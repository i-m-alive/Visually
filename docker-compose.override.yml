version: '3.9'
# Development overrides
services:
  agent_service:
    volumes:
      - ./backend:/app
    command: uvicorn agent_service.main:app --host 0.0.0.0 --port 8001 --reload

  query_executor:
    volumes:
      - ./backend:/app
    command: uvicorn query_executor.main:app --host 0.0.0.0 --port 8002 --reload

  schema_crawler:
    volumes:
      - ./backend:/app
    command: uvicorn schema_crawler.main:app --host 0.0.0.0 --port 8003 --reload

  render_service:
    volumes:
      - ./backend/render_service/src:/app/src

  frontend:
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8001
      - NEXT_PUBLIC_WS_URL=ws://localhost:8001
